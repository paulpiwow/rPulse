spring.application.name=rpulse-backend
server.port=8080

# Datasource — overridden by env vars in Docker Compose.
# Defaults to a local file-less H2 DB so the app boots without Postgres.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:rpulse;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Flyway owns the schema now, so Hibernate must not create/alter tables.
# 'validate' = check entities match the Flyway-built schema (if/when you add entities).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway runs migrations from classpath:db/migration on startup (V1__, V2__, ...).
spring.flyway.enabled=true

# rTruth InfluxDB 3 connector. Docker Compose points this at the host-published
# rTruth port; direct local runs use the same service through loopback.
rpulse.influx.url=${RPULSE_INFLUX_URL:http://127.0.0.1:8087}
rpulse.influx.database=${RPULSE_INFLUX_DATABASE:raw_bucket}
rpulse.influx.token=${RPULSE_INFLUX_TOKEN:}
rpulse.influx.connect-timeout=${RPULSE_INFLUX_CONNECT_TIMEOUT:3s}
rpulse.influx.read-timeout=${RPULSE_INFLUX_READ_TIMEOUT:10s}

# Alarm engine — how often the scheduled evaluation runs (milliseconds). The Operate
# endpoints also evaluate inline on demand; this only paces the background job.
rpulse.alarm.evaluate-interval-ms=${RPULSE_ALARM_EVALUATE_INTERVAL_MS:60000}

# Actuator — expose health/info for container healthchecks.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
