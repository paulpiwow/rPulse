spring.application.name=rpulse-backend
server.port=8080

# Datasource — overridden by env vars in Docker Compose.
# Defaults to a local file-less H2 DB so the app boots without Postgres.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:rpulse;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Flyway owns the schema now, so Hibernate must not create/alter tables.
# 'validate' = check entities match the Flyway-built schema (if/when you add entities).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway runs migrations from classpath:db/migration on startup (V1__, V2__, ...).
spring.flyway.enabled=true

# Actuator — expose health/info for container healthchecks.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
