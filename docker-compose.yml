services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rpulse
      POSTGRES_USER: rpulse
      POSTGRES_PASSWORD: rpulse
    ports:
      - "5544:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpulse -d rpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8456:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/rpulse
      SPRING_DATASOURCE_USERNAME: rpulse
      SPRING_DATASOURCE_PASSWORD: rpulse
      RPULSE_INFLUX_URL: ${RPULSE_INFLUX_URL:-http://host.docker.internal:8087}
      RPULSE_INFLUX_DATABASE: ${RPULSE_INFLUX_DATABASE:-raw_bucket}
      RPULSE_INFLUX_TOKEN: ${RPULSE_INFLUX_TOKEN:-}
      # Dev: read migrations from the bind-mount below instead of the ones baked
      # into the image, so editing SQL only needs a container restart, no rebuild.
      SPRING_FLYWAY_LOCATIONS: filesystem:/migrations
    volumes:
      - ./backend/src/main/resources/db/migration:/migrations:ro
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "java", "-version"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
